<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="Foster Central Command">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#5fa1a1" />
      <stop offset="1" stop-color="#3d7575" />
    </linearGradient>
    <linearGradient id="ring" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f1c885" />
      <stop offset="1" stop-color="#d99e54" />
    </linearGradient>
  </defs>

  <!-- Square base (safe-area aware: art fits within central 80%) -->
  <rect width="512" height="512" rx="96" fill="url(#bg)" />

  <!-- Shield -->
  <g transform="translate(112 96)">
    <path
      d="M144 0c-12 14-36 28-72 32-12 1-20 11-20 23v82c0 78 49 134 92 159 43-25 92-81 92-159V55c0-12-8-22-20-23-36-4-60-18-72-32z"
      fill="url(#ring)" />
    <path
      d="M144 22c-10 11-31 23-62 26-7 1-12 6-12 14v76c0 67 41 116 74 137 33-21 74-70 74-137V62c0-8-5-13-12-14-31-3-52-15-62-26z"
      fill="#faf8f3" />
  </g>

  <!-- FCC monogram -->
  <g transform="translate(256 304)" text-anchor="middle">
    <text
      font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, system-ui, sans-serif"
      font-weight="800"
      font-size="120"
      letter-spacing="-4"
      fill="#3d7575">FCC</text>
  </g>

  <!-- Single amber star above the letters -->
  <g transform="translate(256 196)" fill="#e8b974">
    <polygon points="0,-36 11,-11 38,-11 16,5 24,32 0,16 -24,32 -16,5 -38,-11 -11,-11" />
  </g>
</svg>
