# Manually-triggered build & deploy of the FosterCentralCommand API to Azure Container Apps.
#
# Required GitHub repository secrets:
#   AZURE_CREDENTIALS         - Service-principal JSON from `az ad sp create-for-rbac --sdk-auth`
#   COSMOS_ACCOUNT_ENDPOINT   - e.g. https://cdbfostercentralcommand.documents.azure.com:443/
#   COSMOS_ACCOUNT_KEY        - Cosmos primary key
#
# The service principal in AZURE_CREDENTIALS needs these RBAC roles:
#   - "AcrPush"                       on ACR  acrfoster
#   - "Container Apps Contributor"    on RG   rg-fostercentralcommand   (or Contributor)
#
# On first run this workflow CREATES the Container App "ac-familycalendar" inside the
# existing Container Apps Environment "ace-familycalendar"; subsequent runs UPDATE it.

name: Deploy API

on:
  push:
    branches:
      - main
    paths:
      - "src/api/**"
      - "tests/**"
      - "Dockerfile"
      - ".github/workflows/deploy-api.yml"
  workflow_dispatch:
    inputs:
      imageTag:
        description: "Image tag to build & deploy (default: short git SHA)"
        required: false
        default: ""
      allowedOrigins:
        description: "Comma-separated CORS origins for the API (e.g. https://app.example.com,https://www.example.com)"
        required: false
        default: "https://fosterclan.net,https://www.fosterclan.net,https://witty-field-0c8956b1e.7.azurestaticapps.net"

permissions:
  contents: read

env:
  AZURE_RESOURCE_GROUP: rg-fostercentralcommand
  ACR_NAME: acrfoster
  CONTAINER_APP_ENV: ace-familycalendar
  CONTAINER_APP_NAME: aca-familycalendar
  IMAGE_REPOSITORY: fostercc-api
  TARGET_PORT: "8080"
  COSMOS_DATABASE_NAME: fostercc
  COSMOS_PROFILES_CONTAINER: profiles
  COSMOS_SHOPPING_LISTS_CONTAINER: shoppingLists

jobs:
  build-and-deploy:
    name: Build image and deploy to Container Apps
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve image tag
        id: tag
        shell: bash
        run: |
          tag="${{ inputs.imageTag }}"
          if [ -z "$tag" ]; then tag="${GITHUB_SHA::7}"; fi
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "image=${ACR_NAME}.azurecr.io/${IMAGE_REPOSITORY}:${tag}" >> "$GITHUB_OUTPUT"

      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Log in to ACR
        run: az acr login --name "$ACR_NAME"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ steps.tag.outputs.image }}
            ${{ env.ACR_NAME }}.azurecr.io/${{ env.IMAGE_REPOSITORY }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Extract registry credentials from service principal
        shell: bash
        env:
          AZURE_CREDENTIALS: ${{ secrets.AZURE_CREDENTIALS }}
        run: |
          client_id=$(echo "$AZURE_CREDENTIALS" | jq -r .clientId)
          client_secret=$(echo "$AZURE_CREDENTIALS" | jq -r .clientSecret)
          echo "::add-mask::$client_secret"
          echo "REGISTRY_USERNAME=$client_id" >> "$GITHUB_ENV"
          echo "REGISTRY_PASSWORD=$client_secret" >> "$GITHUB_ENV"

      - name: Build CORS env vars
        id: cors
        shell: bash
        env:
          ALLOWED_ORIGINS: ${{ inputs.allowedOrigins }}
        run: |
          set -euo pipefail
          # Convert comma-separated origins into Cors__AllowedOrigins__0=..., Cors__AllowedOrigins__1=... pairs.
          IFS=',' read -ra origins <<< "$ALLOWED_ORIGINS"
          pairs=()
          i=0
          for o in "${origins[@]}"; do
            o_trimmed="$(echo "$o" | xargs)"
            if [ -n "$o_trimmed" ]; then
              pairs+=("Cors__AllowedOrigins__${i}=${o_trimmed}")
              i=$((i+1))
            fi
          done
          echo "pairs=${pairs[*]}" >> "$GITHUB_OUTPUT"

      - name: Create or update Container App
        shell: bash
        env:
          IMAGE: ${{ steps.tag.outputs.image }}
          COSMOS_ACCOUNT_ENDPOINT: ${{ secrets.COSMOS_ACCOUNT_ENDPOINT }}
          COSMOS_ACCOUNT_KEY: ${{ secrets.COSMOS_ACCOUNT_KEY }}
          CORS_PAIRS: ${{ steps.cors.outputs.pairs }}
        run: |
          set -euo pipefail
          az extension add --name containerapp --upgrade --only-show-errors >/dev/null

          if az containerapp show \
              --name "$CONTAINER_APP_NAME" \
              --resource-group "$AZURE_RESOURCE_GROUP" \
              --output none 2>/dev/null; then
            echo "::notice::Container app exists; updating image and configuration."

            # Ensure ingress is external (idempotent; succeeds if already external).
            az containerapp ingress update \
              --name "$CONTAINER_APP_NAME" \
              --resource-group "$AZURE_RESOURCE_GROUP" \
              --type external \
              --target-port "$TARGET_PORT" \
              --transport auto \
              --output none

            az containerapp registry set \
              --name "$CONTAINER_APP_NAME" \
              --resource-group "$AZURE_RESOURCE_GROUP" \
              --server "${ACR_NAME}.azurecr.io" \
              --username "$REGISTRY_USERNAME" \
              --password "$REGISTRY_PASSWORD" \
              --output none

            az containerapp secret set \
              --name "$CONTAINER_APP_NAME" \
              --resource-group "$AZURE_RESOURCE_GROUP" \
              --secrets \
                cosmos-account-endpoint="$COSMOS_ACCOUNT_ENDPOINT" \
                cosmos-account-key="$COSMOS_ACCOUNT_KEY" \
              --output none

            # shellcheck disable=SC2086
            az containerapp update \
              --name "$CONTAINER_APP_NAME" \
              --resource-group "$AZURE_RESOURCE_GROUP" \
              --image "$IMAGE" \
              --set-env-vars \
                CosmosDb__AccountEndpoint=secretref:cosmos-account-endpoint \
                CosmosDb__AccountKey=secretref:cosmos-account-key \
                CosmosDb__DatabaseName="$COSMOS_DATABASE_NAME" \
                CosmosDb__ProfilesContainer="$COSMOS_PROFILES_CONTAINER" \
                CosmosDb__ShoppingListsContainer="$COSMOS_SHOPPING_LISTS_CONTAINER" \
                $CORS_PAIRS \
              --output none
          else
            echo "::notice::Container app not found; creating."

            # shellcheck disable=SC2086
            az containerapp create \
              --name "$CONTAINER_APP_NAME" \
              --resource-group "$AZURE_RESOURCE_GROUP" \
              --environment "$CONTAINER_APP_ENV" \
              --image "$IMAGE" \
              --target-port "$TARGET_PORT" \
              --ingress external \
              --registry-server "${ACR_NAME}.azurecr.io" \
              --registry-username "$REGISTRY_USERNAME" \
              --registry-password "$REGISTRY_PASSWORD" \
              --secrets \
                cosmos-account-endpoint="$COSMOS_ACCOUNT_ENDPOINT" \
                cosmos-account-key="$COSMOS_ACCOUNT_KEY" \
              --env-vars \
                CosmosDb__AccountEndpoint=secretref:cosmos-account-endpoint \
                CosmosDb__AccountKey=secretref:cosmos-account-key \
                CosmosDb__DatabaseName="$COSMOS_DATABASE_NAME" \
                CosmosDb__ProfilesContainer="$COSMOS_PROFILES_CONTAINER" \
                CosmosDb__ShoppingListsContainer="$COSMOS_SHOPPING_LISTS_CONTAINER" \
                $CORS_PAIRS \
              --min-replicas 0 \
              --max-replicas 2 \
              --cpu 0.5 \
              --memory 1.0Gi \
              --output none
          fi

      - name: Show deployment summary
        shell: bash
        run: |
          fqdn=$(az containerapp show \
            --name "$CONTAINER_APP_NAME" \
            --resource-group "$AZURE_RESOURCE_GROUP" \
            --query "properties.configuration.ingress.fqdn" -o tsv)
          echo "::notice::Container App URL: https://$fqdn"
          {
            echo "## Deployment summary"
            echo ""
            echo "| Item | Value |"
            echo "|---|---|"
            echo "| Image | \`${{ steps.tag.outputs.image }}\` |"
            echo "| Container App | \`$CONTAINER_APP_NAME\` |"
            echo "| URL | https://$fqdn |"
          } >> "$GITHUB_STEP_SUMMARY"
