# Manually-triggered build & deploy of the FosterCentralCommand frontend (Vite/React) to
# the existing Azure Static Web App `swa-familycalendar`.
#
# Required GitHub repository secrets:
#   AZURE_STATIC_WEB_APPS_API_TOKEN  - SWA deployment token.
#   AZURE_CREDENTIALS                - Service-principal JSON used to look up the API FQDN.
#
# The API URL is auto-resolved from the `aca-familycalendar` Container App's ingress FQDN
# so the frontend always points at the live API.

name: Deploy Frontend (SWA)

on:
  push:
    branches:
      - main
    paths:
      - "src/frontend/**"
      - ".github/workflows/deploy-frontend.yml"
  workflow_dispatch:

permissions:
  contents: read

env:
  AZURE_RESOURCE_GROUP: rg-fostercentralcommand
  CONTAINER_APP_NAME: aca-familycalendar

jobs:
  build-and-deploy:
    name: Build and deploy SWA
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Resolve API URL from Container App
        id: api
        shell: bash
        run: |
          set -euo pipefail
          az extension add --name containerapp --upgrade --only-show-errors >/dev/null
          fqdn=$(az containerapp show \
            --name "$CONTAINER_APP_NAME" \
            --resource-group "$AZURE_RESOURCE_GROUP" \
            --query properties.configuration.ingress.fqdn -o tsv)
          if [ -z "$fqdn" ]; then
            echo "::error::Could not resolve Container App FQDN."
            exit 1
          fi
          url="https://${fqdn}"
          echo "::notice::Using VITE_API_URL=$url"
          echo "url=$url" >> "$GITHUB_OUTPUT"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: src/frontend/package-lock.json

      - name: Install dependencies
        working-directory: src/frontend
        run: npm ci --legacy-peer-deps

      - name: Build
        working-directory: src/frontend
        env:
          VITE_API_URL: ${{ steps.api.outputs.url }}
        run: npm run build

      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          # With skip_app_build:true, app_location must point directly at the
          # already-built static output.
          app_location: src/frontend/dist
          skip_app_build: true
